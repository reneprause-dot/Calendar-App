<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B9D">
    <meta name="description" content="Bunte PWA Kalenderapp mit Wunschlisten für die ganze Familie">
    <title>🎨 Mein Familienkalender</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><defs><linearGradient id='grad'><stop offset='0%' style='stop-color:%23FF6B9D'/><stop offset='100%' style='stop-color:%2300D4FF'/></linearGradient></defs><rect fill='url(%23grad)' width='192' height='192' rx='40'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle'>📅</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><defs><linearGradient id='grad'><stop offset='0%' style='stop-color:%23FF6B9D'/><stop offset='100%' style='stop-color:%2300D4FF'/></linearGradient></defs><rect fill='url(%23grad)' width='192' height='192' rx='40'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle'>📅</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header mit Navigation -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">🎨 Mein Familienkalender</h1>
                <nav class="nav-tabs">
                    <button class="nav-btn active" data-view="calendar">📅 Kalender</button>
                    <button class="nav-btn" data-view="wishlist">✨ Wünsche</button>
                    <button class="nav-btn" data-view="profiles">👥 Profile</button>
                </nav>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Kalender View -->
            <section id="calendar-view" class="view active">
                <div class="view-content">
                    <div class="calendar-header">
                        <button id="prev-month" class="nav-arrow" aria-label="Vorheriger Monat">⬅️</button>
                        <h2 id="month-year" class="month-title"></h2>
                        <button id="next-month" class="nav-arrow" aria-label="Nächster Monat">➡️</button>
                    </div>

                    <div class="calendar-container">
                        <div class="weekdays">
                            <div class="weekday">Mo</div>
                            <div class="weekday">Di</div>
                            <div class="weekday">Mi</div>
                            <div class="weekday">Do</div>
                            <div class="weekday">Fr</div>
                            <div class="weekday">Sa</div>
                            <div class="weekday">So</div>
                        </div>
                        <div id="calendar-grid" class="calendar-grid"></div>
                    </div>
                </div>
            </section>

            <!-- Wunschlisten View -->
            <section id="wishlist-view" class="view">
                <div class="view-content">
                    <div class="wishlist-header">
                        <h2>✨ Alle Wunschlisten</h2>
                        <select id="profile-filter" class="profile-select">
                            <option value="">Alle Profile</option>
                        </select>
                    </div>
                    <div id="wishlist-list" class="wishlist-list"></div>
                    <div id="empty-wishlist" class="empty-message">
                        <div class="empty-icon">🎁</div>
                        <p>Noch keine Wunschlisten vorhanden</p>
                        <small>Klicke auf einen Tag im Kalender um eine zu erstellen!</small>
                    </div>
                </div>
            </section>

            <!-- Profile View -->
            <section id="profiles-view" class="view">
                <div class="view-content">
                    <h2 class="section-title">👥 Profile verwalten</h2>
                    <div id="profiles-list" class="profiles-list"></div>
                    <button id="add-profile-btn" class="btn-primary btn-large btn-gradient">➕ Neues Profil erstellen</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Day Modal -->
    <div id="day-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" aria-label="Schließen">✕</button>
            <div class="modal-header">
                <h3 id="modal-day-title"></h3>
                <p id="modal-holiday" class="modal-holiday"></p>
            </div>
            <div class="modal-section">
                <h4>📝 Wunschliste für diesen Tag</h4>
                <div id="modal-wishlist" class="modal-wishlist"></div>
                <div class="input-group">
                    <input type="text" id="quick-wish-input" placeholder="Dein Wunsch..." maxlength="80">
                    <button id="quick-wish-btn" class="btn-primary btn-sm">➕</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" aria-label="Schließen">✕</button>
            <h3 id="profile-modal-title">Neues Profil erstellen</h3>
            <div class="modal-body">
                <div class="input-group">
                    <label for="profile-name">👤 Profilname:</label>
                    <input type="text" id="profile-name" placeholder="z.B. Anna" maxlength="20">
                </div>
                <div class="input-group">
                    <label for="profile-color">🎨 Lieblingsfarbe:</label>
                    <div class="color-picker-group">
                        <input type="color" id="profile-color" value="#FF6B6B">
                        <span id="color-label" class="color-label">Rot</span>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button id="cancel-profile-btn" class="btn-secondary">Abbrechen</button>
                    <button id="save-profile-btn" class="btn-primary btn-gradient">Speichern</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
